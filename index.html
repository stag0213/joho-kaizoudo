<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>画像解像度変換 | ブラウザ完結型</title>
  <!-- 単一ファイル化: CSS をインライン埋め込み（file:// で即起動） -->
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg-page: #0f172a;
      --bg-pane: #1e293b;
      --bg-card: #334155;
      --border: #475569;
      --text: #f1f5f9;
      --text-sub: #94a3b8;
      --accent: #38bdf8;
      --accent-hot: #f97316;
      --placeholder-bg: #475569;
      --preview-height: 400px;
    }

    html, body {
      height: 100%; width: 100%;
      background: var(--bg-page);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Hiragino Sans",
                   "Yu Gothic UI", Meiryo, sans-serif;
      overflow: hidden;
    }
    body { display: flex; flex-direction: column; min-height: 100vh; }

    .app-header {
      flex: 0 0 auto; height: 64px; max-height: 64px;
      padding: 0 24px;
      background: var(--bg-pane);
      border-bottom: 1px solid var(--border);
      display: flex; align-items: center; gap: 16px;
    }
    .app-header h1 { font-size: 18px; font-weight: 700; color: var(--accent); }
    .subtitle { font-size: 12px; color: var(--text-sub); }

    .split {
      flex: 1 1 auto;
      display: flex; flex-direction: row;
      width: 100%; min-height: 0;
      height: calc(100vh - 64px - 36px);
      max-height: calc(100vh - 64px - 36px);
    }

    .pane {
      width: 50%; min-width: 50%; max-width: 50%;
      height: 100%; padding: 16px; overflow: hidden;
      display: flex; flex-direction: column; gap: 12px;
    }
    .pane-left  { background: #182238; }
    .pane-right { background: #1a2440; border-left: 1px solid var(--border); }

    .upload-zone {
      flex: 0 0 20%; max-height: 20%; min-height: 20%;
      background: var(--bg-card);
      border: 2px dashed var(--accent);
      border-radius: 12px;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      transition: background 0.15s;
      position: relative;
    }
    .upload-zone.drag-over { background: rgba(56, 189, 248, 0.18); border-style: solid; }
    .upload-label { text-align: center; pointer-events: none; padding: 8px; }
    .upload-icon  { font-size: 28px; margin-bottom: 4px; }
    .upload-text-main { font-size: 15px; font-weight: 600; }
    .upload-text-sub  { font-size: 11px; color: var(--text-sub); margin-top: 4px; }

    .preview-stage, .output-zone {
      flex: 1 1 auto; min-height: 0;
      display: flex; flex-direction: column; gap: 10px; overflow: hidden;
    }

    .preview-box {
      flex: 0 0 auto;
      height: var(--preview-height); max-height: var(--preview-height); min-height: var(--preview-height);
      width: 100%;
      background: var(--placeholder-bg);
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      overflow: hidden; position: relative;
    }
    .preview-box canvas { max-width: 100%; max-height: 100%; object-fit: contain; display: block; }
    .placeholder {
      position: absolute; inset: 0;
      display: flex; align-items: center; justify-content: center;
      color: var(--text-sub); font-size: 13px; pointer-events: none;
    }
    .preview-box.has-image .placeholder { display: none; }

    .info-block {
      flex: 1 1 auto; min-height: 0;
      background: var(--bg-card);
      border-radius: 10px;
      padding: 12px 16px;
      display: flex; flex-direction: column; gap: 6px; overflow: hidden;
    }
    .info-title { font-size: 12px; font-weight: 700; color: var(--accent); margin-bottom: 4px; letter-spacing: 0.5px; }
    .info-row {
      display: flex; justify-content: space-between; align-items: center;
      font-size: 13px; border-bottom: 1px solid rgba(255,255,255,0.05); padding: 3px 0;
    }
    .info-row span { color: var(--text-sub); }
    .info-row b    { color: var(--text); font-weight: 600; }

    .slider-zone {
      flex: 0 0 20%; max-height: 20%; min-height: 20%;
      background: var(--bg-card);
      border-radius: 12px;
      padding: 10px 16px;
      display: flex; flex-direction: column; justify-content: center; gap: 6px;
    }
    .slider-head { display: flex; justify-content: space-between; align-items: center; }
    .slider-label { font-size: 13px; font-weight: 600; color: var(--accent); }
    .slider-value {
      font-size: 20px; font-weight: 700;
      color: var(--accent-hot); font-variant-numeric: tabular-nums;
    }
    .slider-scale { display: flex; justify-content: space-between; font-size: 10px; color: var(--text-sub); }
    input[type="range"] {
      -webkit-appearance: none; appearance: none;
      width: 100%; height: 6px;
      background: #0f172a; border-radius: 3px; outline: none;
    }
    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none; appearance: none;
      width: 22px; height: 22px;
      background: var(--accent-hot);
      border-radius: 50%; cursor: pointer; border: 2px solid #fff;
    }
    input[type="range"]::-moz-range-thumb {
      width: 22px; height: 22px;
      background: var(--accent-hot);
      border-radius: 50%; cursor: pointer; border: 2px solid #fff;
    }

    .download-btn {
      flex: 0 0 auto; height: 44px; min-height: 44px; max-height: 44px;
      background: var(--accent);
      color: #0f172a; font-weight: 700; font-size: 14px;
      border: none; border-radius: 10px; cursor: pointer;
      transition: background 0.15s, transform 0.05s;
    }
    .download-btn:hover:not(:disabled) { background: #0ea5e9; transform: translateY(-1px); }
    .download-btn:disabled { background: var(--border); color: var(--text-sub); cursor: not-allowed; }

    .app-footer {
      flex: 0 0 auto; height: 36px; max-height: 36px;
      padding: 0 24px;
      background: var(--bg-pane);
      border-top: 1px solid var(--border);
      display: flex; align-items: center; font-size: 11px; color: var(--text-sub);
    }

    @media (max-width: 768px) {
      .split { flex-direction: column; height: auto; max-height: none; }
      .pane  { width: 100%; min-width: 100%; max-width: 100%; height: auto; }
      .preview-box { height: 280px; max-height: 280px; min-height: 280px; }
    }
  </style>
</head>
<body>
  <header class="app-header">
    <h1>画像解像度変換</h1>
    <p class="subtitle">ブラウザ内で完結・データは一切外部送信されません</p>
  </header>

  <main class="split" id="splitRoot">
    <section class="pane pane-left" id="paneLeft">
      <div class="upload-zone" id="uploadZone">
        <input type="file" id="fileInput" accept="image/jpeg,image/png,image/webp" hidden />
        <label for="fileInput" class="upload-label">
          <div class="upload-icon">📁</div>
          <div class="upload-text-main">画像をドラッグ＆ドロップ</div>
          <div class="upload-text-sub">またはクリックして選択 (JPEG / PNG / WebP)</div>
        </label>
      </div>

      <div class="preview-stage" id="previewStage">
        <div class="preview-box" id="originalBox">
          <canvas id="canvasOriginal"></canvas>
          <div class="placeholder" id="placeholderOriginal">
            <span>元画像がここに表示されます</span>
          </div>
        </div>
        <div class="info-block">
          <div class="info-title">元画像情報</div>
          <div class="info-row"><span>解像度</span><b id="origRes">—</b></div>
          <div class="info-row"><span>ファイルサイズ</span><b id="origSize">—</b></div>
          <div class="info-row"><span>形式</span><b id="origFormat">—</b></div>
        </div>
      </div>

      <div class="slider-zone" id="sliderZone">
        <div class="slider-head">
          <span class="slider-label">解像度スケール</span>
          <span class="slider-value" id="sliderValue">100%</span>
        </div>
        <input type="range" id="scaleSlider" min="10" max="100" step="1" value="100" />
        <div class="slider-scale"><span>10%</span><span>100%</span></div>
      </div>
    </section>

    <section class="pane pane-right" id="paneRight">
      <div class="output-zone">
        <div class="preview-box" id="resizedBox">
          <canvas id="canvasResized"></canvas>
          <div class="placeholder" id="placeholderResized">
            <span>変換後プレビュー</span>
          </div>
        </div>
        <div class="info-block">
          <div class="info-title">変換後情報</div>
          <div class="info-row"><span>推定解像度</span><b id="newRes">—</b></div>
          <div class="info-row"><span>推定ファイルサイズ</span><b id="newSize">—</b></div>
          <div class="info-row"><span>削減率</span><b id="reduction">—</b></div>
        </div>
        <button class="download-btn" id="downloadBtn" disabled>
          ⬇ ダウンロード (_resized)
        </button>
      </div>
    </section>
  </main>

  <footer class="app-footer">
    <span>🔒 100%ローカル処理 — ネットワーク送信なし</span>
  </footer>

  <!-- 単一ファイル化: JS をインライン埋め込み（外部 fetch / モジュール不使用） -->
  <script>
    'use strict';

    const fileInput        = document.getElementById('fileInput');
    const uploadZone       = document.getElementById('uploadZone');
    const canvasOriginal   = document.getElementById('canvasOriginal');
    const canvasResized    = document.getElementById('canvasResized');
    const originalBox      = document.getElementById('originalBox');
    const resizedBox       = document.getElementById('resizedBox');
    const placeholderOrig  = document.getElementById('placeholderOriginal');
    const placeholderRsz   = document.getElementById('placeholderResized');
    const slider           = document.getElementById('scaleSlider');
    const sliderValueEl    = document.getElementById('sliderValue');

    const origResEl     = document.getElementById('origRes');
    const origSizeEl    = document.getElementById('origSize');
    const origFormatEl  = document.getElementById('origFormat');
    const newResEl      = document.getElementById('newRes');
    const newSizeEl     = document.getElementById('newSize');
    const reductionEl   = document.getElementById('reduction');
    const downloadBtn   = document.getElementById('downloadBtn');

    const state = { img: null, meta: null, scale: 100, estimatedBlob: null };

    function showError(msg) { alert(msg); }

    function formatBytes(bytes) {
      if (!bytes && bytes !== 0) return '—';
      if (bytes < 1024) return bytes.toFixed(0) + ' B';
      if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(2) + ' KB';
      return (bytes / (1024 * 1024)).toFixed(2) + ' MB';
    }

    function detectFormat(mime, filename) {
      if (mime === 'image/jpeg' || mime === 'image/jpg') return 'JPEG';
      if (mime === 'image/png') return 'PNG';
      if (mime === 'image/webp') return 'WebP';
      const lower = (filename || '').toLowerCase();
      if (lower.endsWith('.jpg') || lower.endsWith('.jpeg')) return 'JPEG';
      if (lower.endsWith('.png')) return 'PNG';
      if (lower.endsWith('.webp')) return 'WebP';
      return 'UNKNOWN';
    }

    const COMPRESSION_FACTOR = { JPEG: 0.15, WEBP: 0.12, PNG: 0.85 };

    function estimateBlobSize(origBytes, origW, origH, newW, newH, mime) {
      const pixelRatio = (newW * newH) / (origW * origH);
      const fmt = detectFormat(mime);
      const factor = COMPRESSION_FACTOR[fmt] ?? 0.3;
      return Math.max(1, Math.round(origBytes * pixelRatio * factor));
    }

    function handleFile(file) {
      if (!file) return;
      const fmt = detectFormat(file.type, file.name);
      if (fmt === 'UNKNOWN') {
        showError('対応していない形式です。JPEG / PNG / WebP を選択してください。');
        return;
      }
      const reader = new FileReader();
      reader.onload = (e) => {
        const img = new Image();
        img.onload = () => {
          state.img = img;
          state.meta = {
            name: file.name, size: file.size,
            type: file.type || ('image/' + fmt.toLowerCase()),
            width: img.naturalWidth, height: img.naturalHeight
          };
          origResEl.textContent    = img.naturalWidth + ' × ' + img.naturalHeight + ' px';
          origSizeEl.textContent   = formatBytes(file.size);
          origFormatEl.textContent = fmt;

          placeholderOrig.style.display = 'none';
          placeholderRsz.style.display  = 'none';
          originalBox.classList.add('has-image');
          resizedBox.classList.add('has-image');

          drawOriginal();
          updateResized(100);
          downloadBtn.disabled = false;
        };
        img.onerror = () => showError('画像の読み込みに失敗しました。');
        img.src = e.target.result;
      };
      reader.onerror = () => showError('ファイルの読み込みに失敗しました。');
      reader.readAsDataURL(file);
    }

    function drawOriginal() {
      const ctx = canvasOriginal.getContext('2d');
      const w = state.meta.width, h = state.meta.height;
      canvasOriginal.width = w; canvasOriginal.height = h;
      ctx.imageSmoothingEnabled = true;
      ctx.imageSmoothingQuality = 'high';
      ctx.drawImage(state.img, 0, 0, w, h);
    }

    function updateResized(scalePct) {
      state.scale = scalePct;
      sliderValueEl.textContent = scalePct + '%';

      const origW = state.meta.width, origH = state.meta.height;
      const newW = Math.max(1, Math.round(origW * scalePct / 100));
      const newH = Math.max(1, Math.round(origH * scalePct / 100));

      newResEl.textContent = newW + ' × ' + newH + ' px';
      const estBytes = estimateBlobSize(state.meta.size, origW, origH, newW, newH, state.meta.type);
      newSizeEl.textContent = formatBytes(estBytes);
      const reduce = ((1 - (newW * newH) / (origW * origH)) * 100);
      reductionEl.textContent = reduce.toFixed(1) + ' %';

      const ctx = canvasResized.getContext('2d');
      canvasResized.width = newW; canvasResized.height = newH;
      ctx.imageSmoothingEnabled = true;
      ctx.imageSmoothingQuality = scalePct < 50 ? 'low' : 'high';
      ctx.clearRect(0, 0, newW, newH);
      ctx.drawImage(state.img, 0, 0, newW, newH);

      const mime = state.meta.type;
      canvasResized.toBlob(
        (blob) => { state.estimatedBlob = blob; },
        mime,
        mime === 'image/png' ? undefined : 0.92
      );
    }

    fileInput.addEventListener('change', function (e) {
      handleFile(e.target.files[0]);
    });

    ['dragenter', 'dragover'].forEach(function (ev) {
      uploadZone.addEventListener(ev, function (e) {
        e.preventDefault(); e.stopPropagation();
        uploadZone.classList.add('drag-over');
      });
    });
    ['dragleave', 'drop'].forEach(function (ev) {
      uploadZone.addEventListener(ev, function (e) {
        e.preventDefault(); e.stopPropagation();
        uploadZone.classList.remove('drag-over');
      });
    });
    uploadZone.addEventListener('drop', function (e) {
      const file = e.dataTransfer.files[0];
      if (file) handleFile(file);
    });

    let rafQueued = false;
    slider.addEventListener('input', function () {
      if (rafQueued) return;
      rafQueued = true;
      requestAnimationFrame(function () {
        updateResized(parseInt(slider.value, 10));
        rafQueued = false;
      });
    });

    downloadBtn.addEventListener('click', function () {
      if (!state.estimatedBlob || !state.meta) return;
      const url = URL.createObjectURL(state.estimatedBlob);
      const a = document.createElement('a');
      const dotIdx = state.meta.name.lastIndexOf('.');
      const base = dotIdx > 0 ? state.meta.name.slice(0, dotIdx) : state.meta.name;
      const ext  = dotIdx > 0 ? state.meta.name.slice(dotIdx) : '';
      a.href = url;
      a.download = base + '_resized' + ext;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      setTimeout(function () { URL.revokeObjectURL(url); }, 1000);
    });
  </script>
</body>
</html>
